<!DOCTYPE html>
<html lang="en">
<head>
    <title>Select a Server</title>
    <style>
        body { font-family: sans-serif; background: #1e1e1e; color: white; padding: 40px; text-align: center; }
        .server-list { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin-top: 30px; }
        .server-card { 
            background: #2b2b2b; padding: 20px; border-radius: 10px; width: 200px; 
            transition: 0.2s; cursor: pointer; border: 2px solid transparent;
        }
        .server-card:hover { border-color: #5865F2; transform: translateY(-5px); }
        .icon { width: 80px; height: 80px; border-radius: 50%; background: #444; margin-bottom: 10px; }
        img { width: 80px; height: 80px; border-radius: 50%; }
        button { background: #5865F2; color: white; border: none; padding: 10px; border-radius: 5px; width: 100%; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>
    <h1>Which server are we configuring?</h1>
    <div class="server-list" id="serverList">Loading your servers...</div>

    <script>
        async function loadServers() {
            try {
                const res = await fetch('/api/user/guilds');
                const guilds = await res.json();
                
                const container = document.getElementById('serverList');
                container.innerHTML = '';

                if (guilds.error) {
                    container.innerHTML = '<p>Error: Please login again.</p>';
                    return;
                }

                guilds.forEach(guild => {
                    const iconUrl = guild.icon 
                        ? `https://cdn.discordapp.com/icons/${guild.id}/${guild.icon}.png` 
                        : 'https://cdn.discordapp.com/embed/avatars/0.png';

                    const card = document.createElement('div');
                    card.className = 'server-card';
                    card.onclick = () => window.location.href = `/dashboard?id=${guild.id}`;
                    card.innerHTML = `
                        <img src="${iconUrl}" alt="${guild.name}">
                        <div style="font-weight: bold; margin: 10px 0;">${guild.name}</div>
                        <button>Manage</button>
                    `;
                    container.appendChild(card);
                });
            } catch (err) {
                document.getElementById('serverList').innerHTML = 'Failed to load servers.';
            }
        }
        loadServers();
    </script>
</body>
</html>
